name: 🗄️ Daily Convex Database Backup

on:
  schedule:
    - cron: '0 0 * * *'   # Runs every day at 12:00 AM UTC (8:00 AM PHT)
  workflow_dispatch:        # Also allows manual trigger from GitHub Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit backup files to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch@3

      - name: Run Convex backup
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: node scripts/backup.mjs

      - name: Commit and push backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "🗄️ backup: $(date +'%Y-%m-%d %H:%M UTC')"
          git push